<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EscolaApp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .login-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; margin-bottom: 30px; color: #e94560; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 1rem;
            outline: none;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        input:focus { border-color: #e94560; background: rgba(255,255,255,0.2); }
        input::placeholder { color: rgba(255,255,255,0.6); }
        button {
            width: 100%;
            padding: 14px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #d63855; transform: translateY(-2px); }
        .flash { padding: 12px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .danger { background: rgba(220, 53, 69, 0.8); }
        .info { background: rgba(23, 162, 184, 0.8); }
        .success { background: rgba(40, 167, 69, 0.8); }
        .admin-hint { text-align: center; margin-top: 20px; opacity: 0.7; font-size: 0.9rem; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
        }
        .back-link:hover { color: #e94560; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2><i class="fas fa-sign-in-alt" style="margin-right: 10px;"></i>Acesso ao Sistema</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        
        <form method="post">
            <div class="form-group">
                <label>Número de Processo</label>
                <input type="text" name="numero_processo" placeholder="Ex: P123 ou 'admin'" required>
            </div>
            <div class="form-group">
                <label>Palavra-passe</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
        
        <div class="admin-hint">
            <i class="fas fa-info-circle"></i> Admin padrão: admin / admin123!
        </div>
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Voltar ao início</a>
    </div>
</body>
</html>
